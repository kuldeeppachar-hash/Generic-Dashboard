<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Generic Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="firebaseConfig.js"></script>

<style>

body{
margin:0;
padding:20px;
font-family:Arial;
background:#06111c;
color:white;
}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;

}

.cardContainer{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;

}

.card{

background:#111c2e;
padding:20px;
border-radius:15px;

}

.card h3{

color:#38bdf8;
margin:0;

}

.card p{

font-size:28px;
font-weight:bold;

}

.section{

background:#111c2e;
padding:20px;
margin-top:20px;
border-radius:15px;

}

table{

width:100%;
border-collapse:collapse;

}

th,td{

padding:12px;
border-bottom:1px solid #333;

}

canvas{

background:white;
padding:15px;
border-radius:15px;

}

</style>

</head>

<body>

<div class="header">

<h1>
📊 Generic Sales Dashboard
</h1>

<div id="updated"></div>

</div>


<div class="cardContainer">

<div class="card">

<h3>Total Sales</h3>
<p id="totalSales">0</p>

</div>

<div class="card">

<h3>Top State</h3>
<p id="topState">-</p>

</div>

<div class="card">

<h3>Top Area</h3>
<p id="topArea">-</p>

</div>

<div class="card">

<h3>Billing Days</h3>
<p id="billingDays">0</p>

</div>

</div>



<div class="section">

<h2>Daily Trend</h2>

<canvas id="trendChart"></canvas>

</div>



<div class="section">

<h2>State Wise Sales</h2>

<table>

<thead>

<tr>

<th>State</th>
<th>Sales</th>

</tr>

</thead>

<tbody id="stateTable">

</tbody>

</table>

</div>



<div class="section">

<h2>Area Wise Sales</h2>

<table>

<thead>

<tr>

<th>Area</th>
<th>Sales</th>

</tr>

</thead>

<tbody id="areaTable">

</tbody>

</table>

</div>




<div class="section">

<h2>Top Products</h2>

<table>

<thead>

<tr>

<th>Product</th>
<th>Sales</th>

</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

</div>



<div class="section">

<h2>Top Customers</h2>

<table>

<thead>

<tr>

<th>Customer</th>
<th>Sales</th>

</tr>

</thead>

<tbody id="customerTable">

</tbody>

</table>

</div>


<script>


async function loadDashboard(){

let snapshot=
await db.ref().once("value");

let data=snapshot.val();


let states=
Object.values(
data.state_data||{}
);

let areas=
Object.values(
data.area_data||{}
);

let products=
Object.values(
data.product_data||{}
);

let customers=
Object.values(
data.customer_data||{}
);

let daily=
Object.values(
data.daily_data||{}
);


let total=0;

states.forEach(x=>{

total+=x.amount;

});


document
.getElementById(
"totalSales"
)
.innerHTML=
"₹"+
(
total/100000
).toFixed(2)+"L";



states.sort(
(a,b)=>
b.amount-a.amount
);

areas.sort(
(a,b)=>
b.amount-a.amount
);

products.sort(
(a,b)=>
b.amount-a.amount
);

customers.sort(
(a,b)=>
b.amount-a.amount
);


document
.getElementById(
"topState"
)
.innerHTML=
states[0]?.name;


document
.getElementById(
"topArea"
)
.innerHTML=
areas[0]?.name;


document
.getElementById(
"billingDays"
)
.innerHTML=
daily.length;



document
.getElementById(
"updated"
)
.innerHTML=
data.meta.updated;



loadTable(
"stateTable",
states.slice(0,15)
);

loadTable(
"areaTable",
areas.slice(0,15)
);

loadTable(
"productTable",
products.slice(0,15)
);

loadTable(
"customerTable",
customers.slice(0,15)
);



loadChart(daily);


}



function loadTable(id,data){

let html="";

data.forEach(x=>{

html+=`

<tr>

<td>${x.name}</td>

<td>
₹${(
x.amount/100000
).toFixed(2)}L
</td>

</tr>

`;

});


document
.getElementById(id)
.innerHTML=
html;


}



function loadChart(data){

data.sort(
(a,b)=>
new Date(a.date)
-
new Date(b.date)
);


new Chart(

document
.getElementById(
"trendChart"
),

{

type:"line",

data:{

labels:
data.map(
x=>x.date
),

datasets:[{

label:
"Sales",

data:
data.map(
x=>x.amount
)

}]

}

}

);


}


loadDashboard();


</script>

</body>

</html>
