<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>
Generic Dashboard
</title>

<style>

body{

margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#06111c;
font-family:Arial;
color:white;

}

.box{

text-align:center;

}

.loader{

width:50px;
height:50px;

border:5px solid #1e293b;

border-top:5px solid #38bdf8;

border-radius:50%;

animation:spin 1s linear infinite;

margin:auto;

margin-bottom:20px;

}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

</style>

</head>

<body>

<div class="box">

<div class="loader"></div>

<h2>
Loading Generic Dashboard...
</h2>

</div>

<script>

window.location.href=
"dashboard.html";

</script>

</body>

</html>
